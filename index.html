<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carousell 二手好物清單</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 20px; max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 1.8rem; margin-bottom: 8px; color: #fff; }
  .subtitle { color: #888; margin-bottom: 24px; font-size: 0.9rem; }
  .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: #ccc; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
  .filter-btn:hover, .filter-btn.active { background: #e8364e; border-color: #e8364e; color: #fff; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 12px 8px; border-bottom: 2px solid #333; color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
  td { padding: 10px 8px; border-bottom: 1px solid #1a1a1a; font-size: 0.9rem; }
  tr:hover { background: #111; }
  .price { color: #e8364e; font-weight: 700; font-size: 1rem; }
  .discount { color: #4ade80; font-weight: 700; }
  .category-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; background: #222; font-size: 0.75rem; color: #aaa; }
  a { color: #60a5fa; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .condition { font-size: 0.8rem; color: #888; }
  .time { font-size: 0.8rem; color: #666; }
  .note { font-size: 0.8rem; color: #999; max-width: 150px; }
  .stats { display: flex; gap: 20px; margin-bottom: 20px; }
  .stat-box { background: #111; padding: 16px; border-radius: 12px; flex: 1; text-align: center; }
  .stat-num { font-size: 1.8rem; font-weight: 700; color: #e8364e; }
  .stat-label { font-size: 0.8rem; color: #888; margin-top: 4px; }
</style>
</head>
<body>

<h1>Carousell 二手好物清單</h1>
<p class="subtitle">自動巡邏系統 | 篩選條件：新品 45% 以下 | 3 天內上架 | 排除二手店行情價</p>

<div class="stats">
  <div class="stat-box"><div class="stat-num" id="total-count">-</div><div class="stat-label">找到好貨</div></div>
  <div class="stat-box"><div class="stat-num" id="best-discount">-</div><div class="stat-label">最低折數</div></div>
  <div class="stat-box"><div class="stat-num" id="last-update">-</div><div class="stat-label">最後更新</div></div>
</div>

<div class="filters" id="filters"></div>

<table>
  <thead>
    <tr>
      <th>分類</th>
      <th>商品</th>
      <th>價格</th>
      <th>市價</th>
      <th>折數</th>
      <th>狀態</th>
      <th>上架</th>
      <th>備註</th>
      <th>連結</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<script>
const csvUrl = 'carousell_wishlist_20260501.csv';

fetch(csvUrl)
  .then(r => r.text())
  .then(text => {
    const lines = text.trim().split('\n');
    const headers = lines[0].split('|');
    const data = lines.slice(1).filter(l => l.trim()).map(line => {
      const vals = line.split('|');
      const obj = {};
      headers.forEach((h, i) => obj[h] = vals[i] || '');
      return obj;
    });

    data.sort((a, b) => parseInt(a.vs_new) - parseInt(b.vs_new));

    const categories = [...new Set(data.map(d => d.category))];
    const filtersEl = document.getElementById('filters');
    const allBtn = document.createElement('button');
    allBtn.className = 'filter-btn active';
    allBtn.textContent = '全部';
    allBtn.onclick = () => render(data, allBtn);
    filtersEl.appendChild(allBtn);
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = cat;
      btn.onclick = () => render(data.filter(d => d.category === cat), btn);
      filtersEl.appendChild(btn);
    });

    document.getElementById('total-count').textContent = data.length;
    document.getElementById('best-discount').textContent = data[0]?.vs_new || '-';
    document.getElementById('last-update').textContent = new Date().toLocaleDateString('zh-TW');

    function render(items, activeBtn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      activeBtn.classList.add('active');
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = items.map(d => `
        <tr>
          <td><span class="category-tag">${d.category}</span></td>
          <td>${d.title}</td>
          <td class="price">$${d.price}</td>
          <td>${d.market_price}</td>
          <td class="discount">${d.vs_new}</td>
          <td class="condition">${d.condition}</td>
          <td class="time">${d.time_ago}</td>
          <td class="note">${d.note}</td>
          <td><a href="${d.url}" target="_blank">查看</a></td>
        </tr>
      `).join('');
    }

    render(data, allBtn);
  });
</script>
</body>
</html>
